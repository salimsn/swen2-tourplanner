spring:
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tourplanner}
    username: ${DB_USER:tourplanner}
    password: ${DB_PASSWORD:tourplanner}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  jackson:
    time-zone: UTC
  docker:
    compose:
      enabled: ${DOCKER_COMPOSE_ENABLED:false}

server:
  port: ${PORT:8080}

logging:
  level:
    dev.salim.backend: DEBUG

openrouteservice:
  enabled: ${ORS_ENABLED:false}
  api-key: ${ORS_API_KEY:}
  base-url: ${ORS_BASE_URL:https://api.openrouteservice.org}

storage:
  image-base-directory: ${TOUR_IMAGE_BASE_DIRECTORY:./tour-images}
